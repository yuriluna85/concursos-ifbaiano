name: Radar Scraper

on:
  schedule:
    - cron: '0 */4 * * *'  # Roda a cada 4 horas
  workflow_dispatch:      # Permite que você clique no botão "Run workflow" para testar agora

jobs:
  build:
    runs-on: ubuntu-latest
    # Adicionando permissões explicitamente para evitar erros de Push
    permissions:
      contents: write
    
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: Rodar Scraper
        run: python scripts/crawler.py

      - name: Salvar alterações (Push)
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/editais.json
          git commit -m "Auto-update: $(date +'%Y-%m-%d %H:%M:%S')" || exit 0
          git push
