name: Radar Scraper

on:
  schedule:
    - cron: '*/30 * * * *'  # MÁGICA: Roda a cada 30 minutos
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: pip install requests beautifulsoup4 urllib3

      - name: Run Scraper
        run: python scripts/crawler.py

      - name: Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/editais.json
          git commit -m "Flash Update v1.0.5: Top 10 Recentes" || exit 0
          git push
